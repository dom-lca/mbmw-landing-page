<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MBMW — Coverage Leads Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css" />
<script src="config.js"></script>
<script type="module" src="admin.js"></script>
</head>
<body>
<div class="bg-gradient"></div>

<!-- LOGIN -->
<section class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">My Baby My Way AI</div>
    <h1 class="auth-title">Super Admin</h1>
    <p class="auth-sub">Sign in to view Medi-Cal coverage leads.</p>
    <form id="login-form" class="auth-form" method="post" action="javascript:void(0)" autocomplete="on" novalidate>
      <label>Email<input type="email" name="email" required autocomplete="email" /></label>
      <label>Password<input type="password" name="password" required autocomplete="current-password" /></label>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign in</button>
      <p class="auth-error" id="login-error" hidden></p>
    </form>
  </div>
</section>

<!-- DASHBOARD -->
<section class="dash-screen" id="dash-screen" hidden>
  <header class="dash-header">
    <div class="container">
      <div class="dash-brand">My Baby My Way AI <span>· Admin</span></div>
      <div class="dash-user">
        <span id="dash-email"></span>
        <button class="btn btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </div>
  </header>
  <main class="container dash-main">
    <div class="dash-head">
      <h1>Coverage Leads</h1>
      <p class="dash-sub">Medi-Cal coverage check submissions. Most recent first.</p>
    </div>
    <div class="dash-table-wrap">
      <table class="dash-table">
        <thead>
          <tr>
            <th>Submitted</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Insurance Provider</th>
          </tr>
        </thead>
        <tbody id="leads-body">
          <tr><td colspan="5" class="dash-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</section>

</body>
</html>
